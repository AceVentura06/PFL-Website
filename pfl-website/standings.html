<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PFL — Standings</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .standings-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .conf-block { }
    .conf-title {
      font-family: 'Oswald', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 2px; color: var(--gold);
      margin-bottom: 16px;
    }
    .div-block { margin-bottom: 28px; }
    .div-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      padding: 8px 12px;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div id="nav"></div>
<div id="ticker"></div>

<section class="page-banner">
  <div class="container">
    <div class="page-banner-title"><em>Standings</em></div>
    <div class="page-banner-sub">Season ${PFL ? PFL.currentSeason : 2025}</div>
  </div>
</section>

<main class="container page-content">

  <div class="tabs" style="margin-bottom:28px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
    <button class="tab-btn active" onclick="setView('division')">Division View</button>
    <button class="tab-btn" onclick="setView('conference')">Conference View</button>
  </div>

  <div id="standings-body"></div>

</main>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/pfl.js"></script>
<script>
  pflInit('standings');

  let currentView = 'division';

  function setView(view) {
    currentView = view;
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (view==='division'&&i===0)||(view==='conference'&&i===1));
    });
    render();
  }

  function divisionBlock(conf, div) {
    const teams = PFL.getSortedDiv(conf, div);
    return `
      <div class="div-block card" style="overflow:hidden">
        <div class="div-title">${conf} ${div}</div>
        <table class="standings-table">
          <thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>PF</th><th>PA</th></tr></thead>
          <tbody>
            ${teams.map(t => `
              <tr>
                <td><div class="team-cell">
                  ${teamCircle(t, 28)}
                  <a href="teams/${t.id.toLowerCase()}.html">${t.city} ${t.name}</a>
                </div></td>
                <td>${t.w}</td><td>${t.l}</td>
                <td>${PFL.pct(t)}</td>
                <td>${t.pf}</td><td>${t.pa}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function confBlock(conf) {
    const divs = ['North','South','East','West'];
    return `
      <div>
        <div class="conf-title">${conf}</div>
        ${divs.map(d => divisionBlock(conf, d)).join('')}
      </div>`;
  }

  function confFullTable(conf) {
    const teams = PFL.getConf(conf).sort((a,b) => {
      const pa = a.w/(a.w+a.l)||0, pb = b.w/(b.w+b.l)||0;
      return pb - pa;
    });
    return `
      <div>
        <div class="conf-title">${conf}</div>
        <div class="card" style="overflow:hidden">
          <table class="standings-table">
            <thead><tr><th>Team</th><th>DIV</th><th>W</th><th>L</th><th>PCT</th><th>PF</th><th>PA</th></tr></thead>
            <tbody>
              ${teams.map(t => `
                <tr>
                  <td><div class="team-cell">
                    ${teamCircle(t, 28)}
                    <a href="teams/${t.id.toLowerCase()}.html">${t.city} ${t.name}</a>
                  </div></td>
                  <td style="color:var(--muted)">${t.div}</td>
                  <td>${t.w}</td><td>${t.l}</td>
                  <td>${PFL.pct(t)}</td>
                  <td>${t.pf}</td><td>${t.pa}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function render() {
    const el = document.getElementById('standings-body');
    if (currentView === 'division') {
      el.innerHTML = `<div class="standings-layout">${confBlock('AFC')}${confBlock('NFC')}</div>`;
    } else {
      el.innerHTML = `<div class="standings-layout">${confFullTable('AFC')}${confFullTable('NFC')}</div>`;
    }
    // fix season label
    document.querySelector('.page-banner-sub').textContent = `Season ${PFL.currentSeason}`;
  }

  render();
</script>
</body>
</html>
