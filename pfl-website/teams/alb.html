<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PFL — Team</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .team-hero {
      border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
      padding: 48px 0 36px;
    }
    .team-hero::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 61px),
                  repeating-linear-gradient(0deg,  transparent, transparent 60px, rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 61px);
      pointer-events: none;
    }
    .team-hero-inner {
      display: flex; align-items: center; gap: 32px;
      position: relative;
    }
    .team-hero-logo { flex-shrink: 0; }
    .team-hero-info { flex: 1; }
    .team-conf-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; padding: 4px 10px; border-radius: 3px;
      margin-bottom: 10px;
    }
    .team-hero-name {
      font-family: 'Oswald', sans-serif;
      font-size: 48px; font-weight: 700; line-height: 1.0;
      color: var(--white);
    }
    .team-hero-name span { display: block; font-size: 24px; opacity: .7; }
    .team-stats-row {
      display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap;
    }
    .team-stat {
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm); padding: 10px 16px; text-align: center;
    }
    .team-stat-val {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700; color: var(--white);
    }
    .team-stat-label { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

    /* content grid */
    .team-content { display: grid; grid-template-columns: 1fr 300px; gap: 32px; margin-top: 32px; }

    /* roster */
    .roster-table { width: 100%; border-collapse: collapse; }
    .roster-table th { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-sub); }
    .roster-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border-sub); color: var(--white); }
    .roster-table tr:last-child td { border-bottom: none; }
    .roster-table tr:hover td { background: rgba(255,255,255,0.03); }
    .pos-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 7px; border-radius: 3px; background: rgba(255,255,255,0.1); }

    /* lore */
    .lore-body { font-family: 'Source Serif 4', serif; font-size: 16px; line-height: 1.8; color: #c8d0e0; font-weight: 300; }
    .lore-body p { margin-bottom: 16px; }

    /* color swatches */
    .color-swatches { display: flex; gap: 12px; margin-top: 12px; }
    .swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div id="nav"></div>
<div id="ticker"></div>

<!-- TEAM HERO — background set dynamically -->
<section class="team-hero" id="team-hero">
  <div class="container">
    <div class="team-hero-inner" id="team-hero-inner">
      <!-- populated by JS -->
    </div>
  </div>
</section>

<main class="container">
  <div class="team-content">

    <!-- LEFT -->
    <div>
      <!-- Schedule -->
      <div class="section-header mt-8"><span class="section-title">Schedule</span></div>
      <div class="card" style="overflow:hidden;margin-bottom:28px;" id="team-schedule">
        <div style="padding:24px;text-align:center;color:var(--muted);">No games scheduled yet.</div>
      </div>

      <!-- Roster -->
      <div class="section-header"><span class="section-title">Roster</span></div>
      <div class="card" style="overflow:hidden;margin-bottom:28px;" id="team-roster">
        <div style="padding:24px;text-align:center;color:var(--muted);">Roster coming soon.</div>
      </div>

      <!-- Lore -->
      <div class="section-header"><span class="section-title">Team Lore</span></div>
      <div class="card" style="padding:24px;" id="team-lore">
        <div class="lore-body"><p>Team lore coming soon.</p></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div style="padding-top:8px;">
      <div class="card" style="padding:20px;margin-bottom:20px;" id="team-info-card">
        <!-- populated by JS -->
      </div>
      <div class="card" style="overflow:hidden;" id="team-standings-card">
        <!-- populated by JS -->
      </div>
    </div>

  </div>
  <div style="padding:24px 0 48px;">
    <a href="../teams.html" class="btn btn-outline">← All Teams</a>
  </div>
</main>

<footer id="footer"></footer>

<script src="../js/data.js"></script>
<script src="../js/pfl.js"></script>
<script>
  // Get team ID from filename (e.g. "brk.html" → "BRK")
  const teamId = window.location.pathname.split('/').pop().replace('.html','').toUpperCase();
  const team = PFL.getTeam(teamId);

  if (!team) {
    document.body.innerHTML = '<div style="padding:80px;text-align:center;color:#8a9bbf;font-family:sans-serif;">Team not found.</div>';
  } else {
    document.title = `PFL — ${team.city} ${team.name}`;
    pflInit('teams');

    // ── HERO ─────────────────────────────────────────────
    document.getElementById('team-hero').style.background =
      `linear-gradient(135deg, ${team.primary}dd, ${team.primary}88, ${team.primary}33)`;

    document.getElementById('team-hero-inner').innerHTML = `
      <div class="team-hero-logo">
        ${teamCircle(team, 100)}
      </div>
      <div class="team-hero-info">
        <div class="team-conf-badge" style="background:${team.secondary}33;color:${team.secondary};border:1px solid ${team.secondary}55;">
          ${team.conf} ${team.div}
        </div>
        <div class="team-hero-name">
          <span>${team.city}</span>
          ${team.name}
        </div>
        <div class="team-stats-row">
          <div class="team-stat">
            <div class="team-stat-val">${team.w}–${team.l}</div>
            <div class="team-stat-label">Record</div>
          </div>
          <div class="team-stat">
            <div class="team-stat-val">${team.pf}</div>
            <div class="team-stat-label">Points For</div>
          </div>
          <div class="team-stat">
            <div class="team-stat-val">${team.pa}</div>
            <div class="team-stat-label">Points Against</div>
          </div>
          <div class="team-stat">
            <div class="team-stat-val">${PFL.pct(team)}</div>
            <div class="team-stat-label">Win %</div>
          </div>
        </div>
      </div>`;

    // ── SCHEDULE ─────────────────────────────────────────
    const teamGames = PFL.schedule.filter(g => g.home === teamId || g.away === teamId);
    const schedEl = document.getElementById('team-schedule');
    if (teamGames.length > 0) {
      schedEl.innerHTML = teamGames.map(renderGameRow).join('');
    }

    // ── SIDEBAR INFO ──────────────────────────────────────
    document.getElementById('team-info-card').innerHTML = `
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);">Team Info</div>
      <div style="font-size:13px;color:var(--muted);line-height:2;">
        <div><strong style="color:var(--white)">City:</strong> ${team.city}</div>
        <div><strong style="color:var(--white)">Conference:</strong> ${team.conf}</div>
        <div><strong style="color:var(--white)">Division:</strong> ${team.div}</div>
      </div>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:16px;margin-bottom:8px;">Team Colors</div>
      <div class="color-swatches">
        <div class="swatch" style="background:${team.primary}" title="Primary"></div>
        <div class="swatch" style="background:${team.secondary}" title="Secondary"></div>
      </div>`;

    // ── STANDINGS IN DIV ──────────────────────────────────
    const divTeams = PFL.getSortedDiv(team.conf, team.div);
    document.getElementById('team-standings-card').innerHTML = `
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);">${team.conf} ${team.div}</div>
      <table class="standings-table">
        <thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th></tr></thead>
        <tbody>
          ${divTeams.map(t => `
            <tr style="${t.id===teamId?'background:rgba(232,184,75,0.06)':''}">
              <td><div class="team-cell">
                <div class="team-dot" style="background:${t.primary}"></div>
                <a href="${t.id.toLowerCase()}.html" style="${t.id===teamId?'color:var(--gold);font-weight:700;':''}">${t.city} ${t.name}</a>
              </div></td>
              <td>${t.w}</td><td>${t.l}</td><td>${PFL.pct(t)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }
</script>
</body>
</html>
