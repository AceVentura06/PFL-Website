<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PFL — Professional Football League</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── HOME-SPECIFIC STYLES ── */
    .hero {
      background: linear-gradient(135deg, #060e1c 0%, #0a1628 50%, #0d1e3a 100%);
      border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(232,184,75,0.03) 60px, rgba(232,184,75,0.03) 61px),
        repeating-linear-gradient(0deg,  transparent, transparent 60px, rgba(232,184,75,0.03) 60px, rgba(232,184,75,0.03) 61px);
      pointer-events: none;
    }
    .hero-inner {
      display: grid; grid-template-columns: 1fr 360px; gap: 40px;
      align-items: start; padding: 48px 0 40px; position: relative;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold-pale); border: 1px solid var(--border);
      color: var(--gold); font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 3px; margin-bottom: 16px;
    }
    .hero-tag::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    .hero-title {
      font-family: 'Oswald', sans-serif;
      font-size: 52px; font-weight: 700; line-height: 1.0;
      letter-spacing: 1px; color: var(--white); margin-bottom: 12px;
    }
    .hero-title em { color: var(--gold); font-style: normal; }
    .hero-meta { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
    .hero-excerpt { font-family: 'Source Serif 4', serif; font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 460px; font-weight: 300; }

    .score-box {
      background: var(--navy-light); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .score-box-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gold);
      border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }
    .score-team { display: flex; align-items: center; gap: 12px; }
    .score-team-info { flex: 1; }
    .score-team-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; }
    .score-team-record { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .score-pts { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; }
    .score-pts.winner { color: var(--gold); }
    .score-divider {
      text-align: center; font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase;
      border-top: 1px solid var(--border-sub); border-bottom: 1px solid var(--border-sub);
      padding: 8px;
    }

    /* main grid */
    .home-grid { display: grid; grid-template-columns: 1fr 320px; gap: 32px; }

    /* featured news */
    .news-featured {
      background: var(--navy-light); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
    }
    .news-featured-img {
      height: 200px;
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .news-featured-img img { width: 100%; height: 100%; object-fit: cover; }
    .news-featured-body { padding: 20px; }
    .news-featured-title {
      font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600;
      line-height: 1.2; color: var(--white); margin-bottom: 8px; margin-top: 6px;
    }
    .news-featured-excerpt {
      font-family: 'Source Serif 4', serif; font-size: 14px;
      color: var(--muted); line-height: 1.6; font-weight: 300;
    }
    .news-list { display: flex; flex-direction: column; gap: 10px; }
    .news-list-item {
      background: var(--navy-light); border: 1px solid var(--border);
      border-radius: 6px; padding: 14px 16px;
      display: flex; gap: 14px; align-items: flex-start;
      cursor: pointer; transition: border-color .2s, background .2s;
      text-decoration: none; color: inherit;
    }
    .news-list-item:hover { border-color: var(--gold); background: rgba(232,184,75,0.04); }
    .news-num { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--border); flex-shrink: 0; width: 28px; line-height: 1; }
    .news-item-title { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; color: var(--white); line-height: 1.3; margin-top: 2px; }
    .news-item-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* sidebar standings */
    .standings-mini { background: var(--navy-light); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    /* teams strip */
    .teams-strip { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
    .team-chip {
      background: var(--navy-light); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: border-color .2s, transform .15s;
      text-decoration: none; color: inherit;
    }
    .team-chip:hover { transform: translateY(-2px); }
    .team-chip-name { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.3; }

    /* sidebar schedule */
    .schedule-mini { background: var(--navy-light); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .schedule-week-label { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
  </style>
</head>
<body>

<div id="nav"></div>
<div id="ticker"></div>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <div class="hero-inner" id="hero-inner">
      <!-- populated by JS -->
    </div>
  </div>
</section>

<!-- MAIN CONTENT -->
<main class="container page-content">
  <div class="home-grid">

    <!-- LEFT: NEWS -->
    <div>
      <div class="section-header">
        <span class="section-title">Latest News</span>
        <a href="news.html" class="section-link">All News →</a>
      </div>
      <div id="news-featured"></div>
      <div class="news-list" id="news-list"></div>
    </div>

    <!-- RIGHT: SIDEBAR -->
    <div>
      <!-- Standings mini -->
      <div class="mb-24">
        <div class="section-header">
          <span class="section-title">Standings</span>
          <a href="standings.html" class="section-link">Full →</a>
        </div>
        <div class="standings-mini">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchStandings('AFC')">AFC</button>
            <button class="tab-btn" onclick="switchStandings('NFC')">NFC</button>
          </div>
          <div id="standings-mini-body"></div>
          <div style="padding:10px 14px;border-top:1px solid var(--border);text-align:center;">
            <a href="standings.html" class="section-link">Full Standings →</a>
          </div>
        </div>
      </div>

      <!-- Schedule mini -->
      <div>
        <div class="section-header">
          <span class="section-title">Schedule</span>
          <a href="schedule.html" class="section-link">Full →</a>
        </div>
        <div class="schedule-mini">
          <div class="schedule-week-label">Week ${PFL ? PFL.currentWeek : ''}</div>
          <div id="schedule-mini-body"></div>
          <div style="padding:10px 14px;border-top:1px solid var(--border);text-align:center;">
            <a href="schedule.html" class="section-link">Full Schedule →</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TEAMS STRIP -->
  <div class="mt-32">
    <div class="section-header">
      <span class="section-title">Teams</span>
      <a href="teams.html" class="section-link">All 32 Teams →</a>
    </div>
    <div class="teams-strip" id="teams-strip"></div>
  </div>
</main>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/pfl.js"></script>
<script>
  pflInit('home');

  // ── HERO ─────────────────────────────────────────────────
  function buildHero() {
    const finals = PFL.schedule.filter(g => g.status === 'final');
    const el = document.getElementById('hero-inner');

    if (finals.length === 0) {
      el.innerHTML = `
        <div>
          <div class="hero-tag">Season ${PFL.currentSeason}</div>
          <div class="hero-title">Welcome to the <em>PFL</em></div>
          <p class="hero-excerpt">The Professional Football League — 32 original teams, two conferences, one champion. Season ${PFL.currentSeason} is underway.</p>
          <a href="teams.html" class="btn btn-gold mt-16">Explore All Teams →</a>
        </div>
        <div class="score-box">
          <div class="score-box-label">Season ${PFL.currentSeason}</div>
          <div style="text-align:center;padding:20px 0;color:var(--muted);font-size:13px;letter-spacing:1px;">
            Game scores will appear here once the season begins.
          </div>
        </div>`;
      return;
    }

    // Show most recent final game
    const g = finals[finals.length - 1];
    const home = PFL.getTeam(g.home);
    const away = PFL.getTeam(g.away);
    const homeWin = g.homeScore > g.awayScore;

    el.innerHTML = `
      <div>
        <div class="hero-tag">Week ${g.week} · Game of the Week</div>
        <div class="hero-title">${homeWin ? home.name : away.name}<br>defeat <em>${homeWin ? away.name : home.name}</em></div>
        <div class="hero-meta">${home.conf} ${home.div} · Week ${g.week}</div>
        <p class="hero-excerpt">Final score: ${away.city} ${away.name} ${g.awayScore}, ${home.city} ${home.name} ${g.homeScore}.</p>
        <a href="schedule.html" class="btn btn-gold mt-16">Full Recap →</a>
      </div>
      <div class="score-box">
        <div class="score-box-label">Week ${g.week} Final</div>
        <div class="score-team">
          ${teamCircle(away, 44)}
          <div class="score-team-info">
            <div class="score-team-name">${away.city} ${away.name}</div>
            <div class="score-team-record">${away.conf} ${away.div}</div>
          </div>
          <div class="score-pts ${!homeWin ? 'winner' : ''}">${g.awayScore}</div>
        </div>
        <div class="score-divider">Final · Week ${g.week}</div>
        <div class="score-team">
          ${teamCircle(home, 44)}
          <div class="score-team-info">
            <div class="score-team-name">${home.city} ${home.name}</div>
            <div class="score-team-record">${home.conf} ${home.div}</div>
          </div>
          <div class="score-pts ${homeWin ? 'winner' : ''}">${g.homeScore}</div>
        </div>
      </div>`;
  }

  // ── NEWS ─────────────────────────────────────────────────
  function buildNews() {
    const featuredEl = document.getElementById('news-featured');
    const listEl = document.getElementById('news-list');

    if (PFL.news.length === 0) {
      featuredEl.innerHTML = `
        <div class="news-featured">
          <div class="news-featured-img"><div style="font-family:'Oswald',sans-serif;font-size:64px;font-weight:700;color:rgba(232,184,75,0.15);letter-spacing:4px;">PFL</div></div>
          <div class="news-featured-body">
            <div class="news-tag">Welcome</div>
            <div class="news-featured-title">The PFL is Open for Business</div>
            <div class="news-featured-excerpt">Season ${PFL.currentSeason} is here. Check back for news, scores, and updates throughout the year.</div>
          </div>
        </div>`;
      listEl.innerHTML = '';
      return;
    }

    const [first, ...rest] = PFL.news;
    featuredEl.innerHTML = `
      <a href="${first.file}" class="news-featured" style="display:block;text-decoration:none;">
        <div class="news-featured-img"><div style="font-family:'Oswald',sans-serif;font-size:64px;font-weight:700;color:rgba(232,184,75,0.15);">PFL</div></div>
        <div class="news-featured-body">
          <div class="news-tag">${first.tag}</div>
          <div class="news-featured-title">${first.title}</div>
          <div class="news-featured-excerpt">${first.excerpt}</div>
          <div class="news-byline">PFL Staff · ${first.date}</div>
        </div>
      </a>`;

    listEl.innerHTML = rest.slice(0, 4).map((n, i) => `
      <a href="${n.file}" class="news-list-item">
        <div class="news-num">0${i + 2}</div>
        <div>
          <div class="news-tag">${n.tag}</div>
          <div class="news-item-title">${n.title}</div>
          <div class="news-item-date">${n.date}</div>
        </div>
      </a>`).join('');
  }

  // ── STANDINGS MINI ────────────────────────────────────────
  let currentConf = 'AFC';
  function switchStandings(conf) {
    currentConf = conf;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (conf === 'AFC' && i === 0) || (conf === 'NFC' && i === 1));
    });
    buildStandingsMini();
  }

  function buildStandingsMini() {
    const divs = ['North', 'South', 'East', 'West'];
    let html = '<table class="standings-table"><thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th></tr></thead><tbody>';
    divs.forEach(div => {
      const teams = PFL.getSortedDiv(currentConf, div);
      html += `<tr class="division-header"><td colspan="4">${currentConf} ${div}</td></tr>`;
      teams.forEach(t => {
        html += `<tr>
          <td><div class="team-cell"><div class="team-dot" style="background:${t.primary}"></div><a href="teams/${t.id.toLowerCase()}.html">${t.id} ${t.name}</a></div></td>
          <td>${t.w}</td><td>${t.l}</td><td>${PFL.pct(t)}</td>
        </tr>`;
      });
    });
    html += '</tbody></table>';
    document.getElementById('standings-mini-body').innerHTML = html;
  }

  // ── SCHEDULE MINI ─────────────────────────────────────────
  function buildScheduleMini() {
    const el = document.getElementById('schedule-mini-body');
    const weekGames = PFL.schedule.filter(g => g.week === PFL.currentWeek).slice(0, 5);
    if (weekGames.length === 0) {
      el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No games scheduled yet.</div>`;
      return;
    }
    el.innerHTML = weekGames.map(renderGameRow).join('');
  }

  // ── TEAMS STRIP ───────────────────────────────────────────
  function buildTeamsStrip() {
    const strip = document.getElementById('teams-strip');
    // Show 16 teams on home page (rotate each load for variety, or just first 16)
    strip.innerHTML = PFL.teams.slice(0, 16).map(t => `
      <a href="teams/${t.id.toLowerCase()}.html" class="team-chip" style="--team-color:${t.primary}" onmouseover="this.style.borderColor='${t.primary}'" onmouseout="this.style.borderColor='rgba(232,184,75,0.2)'">
        ${teamCircle(t, 40)}
        <div class="team-chip-name">${t.name}</div>
      </a>`).join('');
  }

  // ── RUN ───────────────────────────────────────────────────
  buildHero();
  buildNews();
  buildStandingsMini();
  buildScheduleMini();
  buildTeamsStrip();

  // Fix week label
  document.querySelector('.schedule-week-label').textContent = `Week ${PFL.currentWeek}`;
</script>
</body>
</html>
