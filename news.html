<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PFL — News</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .news-grid .news-card:first-child {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .news-grid .news-card:first-child .news-card-img {
      height: 100%; min-height: 220px;
    }
    .news-grid .news-card:first-child .news-card-body {
      padding: 28px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .news-grid .news-card:first-child .news-card-title {
      font-size: 26px;
    }
    .tag-filter { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .tag-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 6px 14px;
      border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .tag-btn:hover, .tag-btn.active { background: var(--gold-pale); color: var(--gold); border-color: var(--gold); }
    .empty-news { padding: 64px; text-align: center; color: var(--muted); }
    .empty-news h2 { font-family: 'Oswald', sans-serif; font-size: 28px; color: var(--white); margin-bottom: 12px; }
  </style>
</head>
<body>

<div id="nav"></div>
<div id="ticker"></div>

<section class="page-banner">
  <div class="container">
    <div class="page-banner-title"><em>News</em> & Updates</div>
    <div class="page-banner-sub">PFL Coverage · Season 2025</div>
  </div>
</section>

<main class="container page-content">

  <div class="tag-filter" id="tag-filter"></div>
  <div id="news-body"></div>

</main>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/pfl.js"></script>
<script>
  pflInit('news');

  let activeTag = 'all';

  function buildTagFilter() {
    const tags = ['all', ...new Set(PFL.news.map(n => n.tag))];
    document.getElementById('tag-filter').innerHTML = tags.map(t => `
      <button class="tag-btn ${t==='all'?'active':''}" onclick="filterTag('${t}', this)">
        ${t === 'all' ? 'All' : t}
      </button>`).join('');
  }

  function filterTag(tag, btn) {
    activeTag = tag;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNews();
  }

  function renderNews() {
    const el = document.getElementById('news-body');
    let posts = activeTag === 'all' ? PFL.news : PFL.news.filter(n => n.tag === activeTag);

    if (posts.length === 0) {
      el.innerHTML = `
        <div class="card empty-news">
          <h2>No Posts Yet</h2>
          <p>Add entries to the <code>news</code> array in <code>js/data.js</code> and drop HTML files in the <code>news/</code> folder.</p>
        </div>`;
      return;
    }

    el.innerHTML = `<div class="news-grid">` +
      posts.map((n, i) => `
        <a href="${n.file}" class="news-card" style="text-decoration:none;color:inherit;">
          <div class="news-card-img">
            ${n.image ? `<img src="${n.image}" alt="${n.title}"/>` : `<div class="news-card-img-placeholder">PFL</div>`}
          </div>
          <div class="news-card-body">
            <div class="news-tag">${n.tag}</div>
            <div class="news-card-title">${n.title}</div>
            <div class="news-card-excerpt">${n.excerpt}</div>
            <div class="news-byline">PFL Staff · ${n.date}</div>
          </div>
        </a>`).join('') +
      `</div>`;
  }

  buildTagFilter();
  renderNews();
</script>
</body>
</html>
